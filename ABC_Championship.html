<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ABC Championship Dashboard – Cars24</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* ── RESET ── */
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#030912;min-height:100vh;font-family:'Barlow Condensed',Impact,sans-serif;color:#fff}

/* ── KEYFRAMES ── */
@keyframes scan{0%{top:-6px}100%{top:100%}}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes glitch{0%,88%,100%{clip-path:none;transform:none}90%{clip-path:polygon(0 18%,100% 18%,100% 38%,0 38%);transform:translateX(-4px)}92%{clip-path:polygon(0 58%,100% 58%,100% 78%,0 78%);transform:translateX(4px)}94%{clip-path:none}}
@keyframes pulseGold{0%,100%{box-shadow:0 0 0 0 #FFB80050}60%{box-shadow:0 0 0 10px #FFB80000}}
@keyframes pulseRed{0%,100%{box-shadow:0 0 0 0 #FF3D3D50}60%{box-shadow:0 0 0 12px #FF3D3D00}}
@keyframes glow{0%,100%{text-shadow:0 0 8px #FFB800,0 0 18px #FFB80055}50%{text-shadow:0 0 18px #FFB800,0 0 36px #FFB800,0 0 54px #FFB80044}}
@keyframes blink{0%,49%{opacity:1}50%,99%{opacity:0}}
@keyframes zeroFlash{0%,100%{background:#1f0606;border-color:#FF3D3D}50%{background:#2e0808;border-color:#ff6b6b}}
@keyframes rowIn{from{opacity:0;transform:translateX(-18px)}to{opacity:1;transform:translateX(0)}}
@keyframes regionIn{from{opacity:0;transform:translateY(6px) scale(.99)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes float{from{transform:translateY(0);opacity:.75}to{transform:translateY(-55px);opacity:0}}

/* ── CANVAS SPARKS ── */
#sparks{position:absolute;top:0;left:0;width:100%;height:200px;pointer-events:none;z-index:0}
.scanbar{position:absolute;left:0;right:0;height:5px;background:linear-gradient(transparent,#00C9A72a,transparent);animation:scan 9s linear infinite;pointer-events:none;z-index:3}

/* ── WRAPPER ── */
.dash{position:relative;max-width:1120px;margin:0 auto;background:#030912;border:1px solid #1a2640;overflow:hidden}
.layer{position:relative;z-index:1}

/* ── HEADER ── */
.hdr{background:#060f1e;border-bottom:3px solid #FFB800;padding:14px 22px;display:grid;grid-template-columns:220px 1fr 180px;align-items:center;gap:16px}
.logo-block{}
.reg-tag{font-size:8px;letter-spacing:5px;color:#FFB800;font-weight:700}
.main-title{font-family:'Bebas Neue',sans-serif;font-size:46px;letter-spacing:4px;line-height:.95;animation:glitch 8s infinite}
.main-title span{background:linear-gradient(90deg,#FFB800,#FFF7CC,#FF9800,#FFB800,#FFF7CC);background-size:300% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 3s linear infinite}
.hdr-date{font-size:8px;letter-spacing:2px;color:#4a5870;margin-top:3px}
.c24-logo{display:block;margin-top:8px;height:18px;filter:brightness(0) invert(1);opacity:.4}
.trip-block{text-align:center;border-left:1px solid #1a2640;border-right:1px solid #1a2640;padding:0 20px}
.trip-eye{font-size:8px;letter-spacing:4px;color:#4a5870}
.trip-word{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:3px;background:linear-gradient(90deg,#FFB800,#FFFBE0,#FF9800,#FFB800);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 2.5s linear infinite}
.trip-sub{font-size:9px;letter-spacing:2px;color:#dde}
.dest-pill{margin-top:8px;display:inline-block;padding:4px 14px;background:#FFB80010;border:1px solid #FFB80040;border-radius:1px}
.dest-pill-lbl{font-size:8px;letter-spacing:2px;color:#FFB800}
.dest-pill-val{font-size:13px;letter-spacing:4px;color:#fff;font-family:'Bebas Neue',sans-serif}
.dest-block{text-align:right}
.dest-lbl{font-size:8px;letter-spacing:3px;color:#4a5870}
.dest-q{font-size:54px;letter-spacing:8px;color:#FF3D3D;line-height:1;font-family:'Bebas Neue',sans-serif;animation:glow 2s infinite}
.dest-sub{font-size:8px;letter-spacing:2px;color:#FF3D3D;animation:blink 1.8s infinite}

/* ── TICKER ── */
.ticker{background:#FFB800;overflow:hidden;white-space:nowrap;padding:5px 0}
.ticker-inner{display:inline-block;animation:ticker 24s linear infinite}
.tick-item{font-size:10px;letter-spacing:3px;color:#030912;padding:0 48px;font-weight:700}

/* ── REGION TABS ── */
.tabs{display:flex;background:#060f1e;border-bottom:1px solid #1a2640}
.tab{flex:1;padding:9px;text-align:center;font-size:11px;letter-spacing:4px;color:#4a5870;cursor:pointer;border-bottom:3px solid transparent;transition:all .25s;font-weight:700}
.tab.active{color:#FFB800;border-bottom-color:#FFB800;background:#0a1828}
.tab:hover:not(.active){color:#ccd}

/* ── STAT ROW ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid #1a2640}
.stat{padding:11px 16px;border-right:1px solid #1a2640;position:relative;overflow:hidden}
.stat:last-child{border-right:none}
.stat::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:currentColor;opacity:.12}
.stag{position:absolute;top:8px;right:10px;font-size:8px;padding:2px 6px;border-radius:1px;font-weight:700;letter-spacing:1px}
.ytag{background:#FF3D3D18;color:#FF3D3D;border:1px solid #FF3D3D40}
.mtag{background:#00C9A718;color:#00C9A7;border:1px solid #00C9A740}
.slbl{font-size:8px;letter-spacing:3px;color:#4a5870;font-weight:700}
.snum{font-size:38px;line-height:1;font-family:'Bebas Neue',sans-serif}
.ssub{font-size:9px;color:#4a5870}

/* ── SECTION DIVIDER ── */
.secbar{background:#060f1e;border-top:2px solid #FFB800;border-bottom:1px solid #1a2640;padding:5px 16px;display:flex;align-items:center;gap:12px}
.seclbl{font-size:10px;letter-spacing:5px;color:#FFB800;font-weight:700}
.secsub{font-size:9px;letter-spacing:2px;color:#4a5870}

/* ── TWO-COL GRID ── */
.twocol{display:grid;grid-template-columns:1fr 1fr}
.colL{border-right:1px solid #1a2640}
.colhdr{padding:7px 14px;background:#060f1e;border-bottom:1px solid #1a2640;display:flex;align-items:center;justify-content:space-between}
.coltitle{font-size:11px;letter-spacing:3px;color:#fff;font-weight:700}
.cpill{font-size:8px;padding:2px 7px;border-radius:1px;letter-spacing:1px;font-weight:700}
.rpill{background:#FF3D3D18;color:#FF3D3D;border:1px solid #FF3D3D50}
.tpill{background:#00C9A718;color:#00C9A7;border:1px solid #00C9A750}

/* ── FTD ROWS ── */
.row{display:flex;align-items:center;padding:5px 13px;border-bottom:1px solid #0d1828;gap:5px;opacity:0;animation:rowIn .4s forwards}
.row.top{background:#0d1e09}
.row.no1{animation:pulseGold 2.5s infinite,rowIn .4s forwards}
.rpos{width:22px;font-size:9px;color:#4a5870;flex-shrink:0}
.rname{flex:1;font-size:12px;color:#dde8ff;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rreg{font-size:7px;padding:1px 4px;background:#0d1828;color:#4a5870;border-radius:1px;flex-shrink:0;margin-right:2px}
.rabc{font-size:21px;color:#FFB800;width:22px;text-align:center;flex-shrink:0;font-family:'Bebas Neue',sans-serif}
.rmeta{font-size:9px;color:#4a5870;text-align:right;flex-shrink:0;width:72px}
.t100{font-size:8px;padding:1px 5px;background:#00C9A718;color:#00C9A7;border:1px solid #00C9A740;border-radius:1px;flex-shrink:0}
.ttop{font-size:8px;padding:1px 5px;background:#FFB80018;color:#FFB800;border:1px solid #FFB80040;border-radius:1px;flex-shrink:0}

/* ── ZERO CALLOUT ── */
.zbox{margin:8px 13px;padding:8px 12px;border-left:3px solid #FF3D3D;animation:zeroFlash 2.5s infinite;background:#1f0606}
.zboxm{margin:7px 13px;padding:7px 12px;border-left:3px solid #FF8C00;background:#1c1000}
.zrow{display:flex;align-items:baseline;gap:8px}
.znum{font-size:30px;color:#FF3D3D;font-family:'Bebas Neue',sans-serif;animation:pulseRed 1.5s infinite}
.znumm{font-size:26px;color:#FF8C00;font-family:'Bebas Neue',sans-serif}
.zlbl{font-size:9px;color:#FF3D3D;letter-spacing:1px;font-weight:700}
.zlblm{font-size:9px;color:#FF8C00;letter-spacing:1px;font-weight:700}
.zsub{font-size:9px;color:#4a5870;margin-top:2px;line-height:1.4}

/* ── PODIUM ── */
.podium{display:flex;padding:10px 12px;gap:6px;border-bottom:1px solid #1a2640;align-items:flex-end}
.pod{flex:1;text-align:center;border-radius:2px}
.p1{background:#140e01;border:1px solid #FFB80066;order:2}
.p2{background:#06101a;border:1px solid #8892a430;order:1}
.p3{background:#110901;border:1px solid #b87a3330;order:3}
.pin{padding:8px 5px}
.pmed{font-size:14px;font-family:'Bebas Neue',sans-serif;line-height:1}
.p1 .pmed{color:#FFB800;animation:glow 2s infinite}
.p2 .pmed{color:#a8b4c8}
.p3 .pmed{color:#cd7f32}
.pname{font-size:9px;color:#fff;margin:3px 0 2px;font-weight:700;line-height:1.2}
.preg{font-size:7px;color:#4a5870;letter-spacing:1px}
.pabc{font-family:'Bebas Neue',sans-serif;line-height:1}
.p1 .pabc{font-size:40px;color:#FFB800}
.p2 .pabc{font-size:30px;color:#00C9A7}
.p3 .pabc{font-size:28px;color:#00C9A7}
.ptag{font-size:7px;letter-spacing:2px;color:#4a5870}
.ppct{font-size:10px;font-weight:700}
.p1 .ppct{color:#FFB800}
.p2 .ppct{color:#a8b4c8}
.p3 .ppct{color:#cd7f32}

/* ── MTD ROWS ── */
.mrow{display:flex;align-items:center;padding:4px 13px;border-bottom:1px solid #0d1828;gap:5px;opacity:0;animation:rowIn .4s forwards}
.malert{background:#160407}
.mpos{width:22px;font-size:9px;color:#4a5870;flex-shrink:0}
.mname{flex:1;font-size:11px;color:#b8c8de;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mabc{font-size:15px;color:#00C9A7;width:20px;text-align:center;flex-shrink:0;font-family:'Bebas Neue',sans-serif}
.mdis{font-size:9px;color:#4a5870;width:32px;text-align:right;flex-shrink:0}
.mpct{font-size:9px;width:36px;text-align:right;flex-shrink:0}

/* ── COMMENTARY ── */
.comm{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid #1a2640}
.cbox{padding:9px 16px;background:#060f1e}
.cbox:first-child{border-right:1px solid #1a2640}
.chead{font-size:8px;letter-spacing:3px;color:#FFB800;font-weight:700;margin-bottom:4px}
.cbody{font-size:10px;color:#8899aa;line-height:1.55}
.cbody b{color:#00C9A7}
.cbody .r{color:#FF3D3D}

/* ── FOMO FOOTER ── */
.fomo{background:#09011a;border-top:3px solid #FF3D3D;padding:13px 22px;display:flex;align-items:center;justify-content:space-between}
.fhl{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:#FF3D3D;line-height:1.1;animation:pulseRed 2s infinite}
.fsub{font-size:9px;letter-spacing:2px;color:#4a5870;margin-top:2px}
.fcta{text-align:center;flex:1;padding:0 18px}
.fcta-top{font-size:9px;letter-spacing:3px;color:#4a5870}
.fcta-main{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:#fff}
.fcta-main span{color:#FFB800}
.fcta-sub{font-size:9px;letter-spacing:2px;color:#4a5870;margin-top:3px}
.fr{text-align:right}
.frlbl{font-size:8px;letter-spacing:3px;color:#4a5870}
.frnum{font-family:'Bebas Neue',sans-serif;font-size:44px;color:#00C9A7;line-height:1}
.frsub{font-size:9px;color:#4a5870;letter-spacing:1px}

/* ── REGION CONTENT ── */
.rc{animation:regionIn .35s ease-out}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  .hdr{grid-template-columns:1fr;text-align:center;gap:10px}
  .trip-block{border:none;padding:0}
  .dest-block{text-align:center}
  .twocol{grid-template-columns:1fr}
  .colL{border-right:none;border-bottom:1px solid #1a2640}
  .stats{grid-template-columns:1fr 1fr}
  .comm{grid-template-columns:1fr}
  .cbox:first-child{border-right:none;border-bottom:1px solid #1a2640}
  .fomo{flex-direction:column;gap:12px;text-align:center}
  .tabs .tab{font-size:9px;letter-spacing:2px;padding:8px 4px}
  .main-title{font-size:36px}
}
</style>
</head>

/* ── FTD SECTION ── */
function ftdHTML(people,role){
  const sc=people.filter(p=>p.ftd_a>0).sort((a,b)=>b.ftd_a-a.ftd_a||b.ftd_d-a.ftd_d);
  const zeros=people.filter(p=>p.ftd_a===0);
  let h='';
  sc.forEach((p,i)=>{
    // rank within scorers
    let r=1;
    for(let j=0;j<i;j++){if(sc[j].ftd_a>p.ftd_a)r=j+2;}
    const isNo1=p.ftd_a===sc[0].ftd_a;
    const cls=isNo1?'row top no1':i<3?'row top':'row';
    const rr=p.region?`<span class="rreg">${E(p.region)}</span>`:'';
    const t100=p.ftd_at===1&&p.ftd_d>0?'<span class="t100">100%</span>':'';
    const ttop=p.ftd_a===sc[0].ftd_a&&i===0?'<span class="ttop">TOP</span>':'';
    const at=p.ftd_at===null?'—':P(p.ftd_at);
    h+=`<div class="${cls}" style="animation-delay:${i*50}ms">
<div class="rpos">#${p.ftd_a===sc[0]?.ftd_a&&i===0?1:r}</div>
<div class="rname">${T(E(p.name),22)}</div>${rr}${ttop}${t100}
<div class="rabc">${p.ftd_a}</div><div class="rmeta">${p.ftd_d}d · ${at}</div></div>`;
  });
  if(zeros.length){
    const names=zeros.slice(0,6).map(z=>E(z.name.split(' ')[0])).join(', ')+(zeros.length>6?` +${zeros.length-6} more`:'');
    h+=`<div class="zbox"><div class="zrow"><div class="znum">${zeros.length}</div>
<div><div class="zlbl">${role}s — ZERO ABC YESTERDAY</div>
<div class="zsub">${names}<br>Today is a fresh start. One deal changes everything.</div></div></div></div>`;
  }
  return h;
}

/* ── MTD SECTION ── */
function mtdHTML(people,role){
  const sorted=rank(people,'mtd_a');
  const top3=sorted.slice(0,3);
  const rest=sorted.slice(3,14);
  const zm=people.filter(p=>p.mtd_a===0);

  // podium: index 0 = #1 (center), 1 = #2 (left), 2 = #3 (right)
  const pcls=['p1','p2','p3'];
  const meds=['#1','#2','#3'];
  let pod='<div class="podium">';
  [0,1,2].forEach(i=>{
    const p=top3[i];
    if(!p){pod+=`<div class="pod ${pcls[i]}" style="opacity:.25"><div class="pin"></div></div>`;return;}
    const rr=p.region?`<div class="preg">${E(p.region)}</div>`:'';
    pod+=`<div class="pod ${pcls[i]}"><div class="pin">
<div class="pmed">${meds[i]}</div>
<div class="pname">${T(E(p.name),16)}</div>${rr}
<div class="pabc">${p.mtd_a}</div><div class="ptag">ABC</div>
<div class="ppct">${P(p.mtd_at)}</div>
</div></div>`;
  });
  pod+='</div>';

  let rows='';
  rest.forEach((p,i)=>{
    const alert=p.mtd_d>=10&&p.mtd_at<0.08&&p.mtd_a>0;
    const rr=p.region?`<span class="rreg" style="font-size:7px">${E(p.region)}</span>`:'';
    const pc=AC(p.mtd_at);
    const pm=alert?`<div class="mpos" style="color:#FF3D3D">!</div>`:`<div class="mpos">#${p._rank}</div>`;
    const nm=alert?`style="color:#ff7070"`:'';
    rows+=`<div class="mrow${alert?' malert':''}" style="animation-delay:${(i+8)*40}ms">
${pm}<div class="mname" ${nm}>${T(E(p.name),19)}</div>${rr}
<div class="mabc">${p.mtd_a}</div>
<div class="mdis">${p.mtd_d}d</div>
<div class="mpct" style="color:${pc}">${P(p.mtd_at)}</div></div>`;
  });

  let zmh='';
  if(zm.length){
    const names=zm.slice(0,5).map(z=>E(z.name.split(' ')[0])).join(', ')+(zm.length>5?` +${zm.length-5} more`:'');
    zmh=`<div class="zboxm"><div class="zrow"><div class="znumm">${zm.length}</div>
<div><div class="zlblm">${role}s — ZERO ABC THIS MONTH</div>
<div class="zsub">${names} — the trip is still on the table!</div></div></div></div>`;
  }
  return pod+rows+zmh;
}

/* ── COMMENTARY ── */
function commHTML(sm,asm,reg){
  const sch=sm.filter(p=>p.ftd_a>0).sort((a,b)=>b.ftd_a-a.ftd_a);
  const ach=asm.filter(p=>p.ftd_a>0).sort((a,b)=>b.ftd_a-a.ftd_a);
  const smM=[...sm].sort((a,b)=>b.mtd_a-a.mtd_a)[0];
  const asmM=[...asm].sort((a,b)=>b.mtd_a-a.mtd_a)[0];
  const szY=sm.filter(p=>p.ftd_a===0).length;
  const azY=asm.filter(p=>p.ftd_a===0).length;
  const hero=sch[0],ahero=ach[0];
  const al=sm.filter(p=>p.mtd_d>=10&&p.mtd_at<0.08&&p.mtd_a>0).slice(0,2);
  const altxt=al.length?`<span class="r">${al.map(a=>a.name.split(' ')[0]).join(', ')} — high disbursals, low attach. NOW is the time.</span> `:'';
  const htxt=hero?`<b>${E(hero.name)}</b> led SMs with ${hero.ftd_a} ABC.`:'No SM scored ABC yesterday.';
  const ahtxt=ahero?`<b>${E(ahero.name)}</b> led ASMs with ${ahero.ftd_a} ABC.`:'No ASM scored ABC yesterday.';
  return`<div class="comm">
<div class="cbox"><div class="chead">YESTERDAY'S BATTLEFIELD</div>
<div class="cbody">${htxt} ${ahtxt} <span class="r">${szY} SMs & ${azY} ASMs at zero.</span> Today is your comeback. One deal right now.</div></div>
<div class="cbox"><div class="chead">TRIP RACE · MTD</div>
<div class="cbody">${altxt}<b>${smM?E(smM.name):'—'}</b> leads the SM race. <b>${asmM?E(asmM.name):'—'}</b> leads ASMs. Regional toppers earn the trip. <b>Destination drops soon — don't miss the bus.</b></div></div>
</div>`;
}

/* ── STATS ROW ── */
function statsHTML(sm,asm){
  const p=(v,d)=>(v*100).toFixed(d===undefined?1:d)+'%';
  return`<div class="stats">
<div class="stat" style="color:#FF3D3D"><div class="stag ytag">YESTERDAY</div>
<div class="slbl">SM ABC YESTERDAY</div>
<div class="snum" data-count="${sm.tfa}" data-float="0">0</div>
<div class="ssub">of ${sm.tfd} disbursals</div></div>
<div class="stat" style="color:#FF3D3D"><div class="stag ytag">YESTERDAY</div>
<div class="slbl">SM ATTACH</div>
<div class="snum" data-count="${(sm.tfat*100).toFixed(1)}" data-float="1" data-suf="%">0%</div>
<div class="ssub">yesterday</div></div>
<div class="stat" style="color:#FFB800"><div class="stag mtag">MTD</div>
<div class="slbl">SM ABC THIS MONTH</div>
<div class="snum" data-count="${sm.tma}" data-float="0">0</div>
<div class="ssub">of ${sm.tmd} disbursals</div></div>
<div class="stat" style="color:#00C9A7"><div class="stag mtag">MTD</div>
<div class="slbl">SM ATTACH</div>
<div class="snum" data-count="${(sm.tmat*100).toFixed(1)}" data-float="1" data-suf="%">0%</div>
<div class="ssub">month to date</div></div>
</div>`;
}

/* ── RENDER ── */
const TABS=['NCR','North','South','National'];
let curTab='NCR';

function setTicker(reg){
  const txt=reg.toUpperCase()+' REGION · ABC CHAMPIONSHIP MARCH 2026 · REGIONAL TOPPERS WIN THE TRIP · DESTINATION REVEAL COMING SOON · THE CLOCK IS TICKING ·';
  document.getElementById('t1').textContent=txt;
  document.getElementById('t2').textContent=txt;
}

function switchTab(r){
  curTab=r;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',TABS[i]===r));
  document.getElementById('hdr-region').textContent=r.toUpperCase()+' REGION';
  setTicker(r);
  render(r);
}

function render(r){
  const d=REGIONS[r];
  const sm=d.SM; const asm=d.ASM;
  const el=document.getElementById('rc');
  const fomoPct=(sm.tmat*100).toFixed(1);

  el.innerHTML=
    statsHTML(sm,asm)+
    `<div class="secbar"><div class="seclbl">SM LEADERBOARD</div><div class="secsub">SALES MANAGERS · ${E(r.toUpperCase())}</div></div>`+
    `<div class="twocol">
      <div class="colL"><div class="colhdr"><div class="coltitle">YESTERDAY · SM</div><div class="cpill rpill">YTD</div></div>${ftdHTML(sm.people,'SM')}</div>
      <div><div class="colhdr"><div class="coltitle">MTD STANDINGS · SM</div><div class="cpill tpill">MTD</div></div>${mtdHTML(sm.people,'SM')}</div>
    </div>`+
    `<div class="secbar"><div class="seclbl">ASM LEADERBOARD</div><div class="secsub">AREA SALES MANAGERS · ${E(r.toUpperCase())}</div></div>`+
    `<div class="twocol">
      <div class="colL"><div class="colhdr"><div class="coltitle">YESTERDAY · ASM</div><div class="cpill rpill">YTD</div></div>${ftdHTML(asm.people,'ASM')}</div>
      <div><div class="colhdr"><div class="coltitle">MTD STANDINGS · ASM</div><div class="cpill tpill">MTD</div></div>${mtdHTML(asm.people,'ASM')}</div>
    </div>`+
    commHTML(sm.people,asm.people,r)+
    `<div class="fomo">
      <div><div class="fhl">DON'T MISS<br>THE TRIP.</div><div class="fsub">YOUR NAME SHOULD BE ON THIS BOARD</div></div>
      <div class="fcta"><div class="fcta-top">REGIONAL TOPPERS</div>
      <div class="fcta-main">GET SELECTED FOR THE <span>TRIP</span></div>
      <div class="fcta-sub">DESTINATION REVEAL — WATCH THIS SPACE</div></div>
      <div class="fr"><div class="frlbl">${E(r.toUpperCase())} SM ABC MTD</div>
      <div class="frnum" data-count="${sm.tma}" data-float="0">0</div>
      <div class="frsub">MTD · ${fomoPct}% ATTACH</div></div>
    </div>`;

  el.classList.remove('rc');
  void el.offsetWidth;
  el.classList.add('rc');
  el.querySelectorAll('[data-count]').forEach(n=>{
    animNum(n,parseFloat(n.dataset.count),n.dataset.float==='1',n.dataset.suf||'');
  });
}

/* ── INIT TABS ── */
const tabRow=document.getElementById('tabs-row');
TABS.forEach(t=>{
  const d=document.createElement('div');
  d.className='tab'+(t==='NCR'?' active':'');
  d.textContent=t.toUpperCase();
  d.onclick=()=>switchTab(t);
  tabRow.appendChild(d);
});
setTicker('NCR');
render('NCR');

/* ── SPARKS CANVAS ── */
const canvas=document.getElementById('sparks');
const ctx=canvas.getContext('2d');
let pts=[];
function resize(){canvas.width=document.querySelector('.dash').offsetWidth;canvas.height=200;}
resize();
window.addEventListener('resize',resize);
function spawn(){
  pts.push({x:Math.random()*canvas.width,y:canvas.height,
    vx:(Math.random()-.5)*1.8,vy:-Math.random()*2.2-.5,
    life:1,sz:Math.random()*2+.7,col:Math.random()>.5?'#FFB800':'#FF9800'});
}
(function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(Math.random()>.58)spawn();
  pts=pts.filter(p=>p.life>0);
  pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=.015;
    ctx.globalAlpha=p.life*.6;ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,6.28);ctx.fill();});
  ctx.globalAlpha=1;requestAnimationFrame(loop);
})();
</script>
